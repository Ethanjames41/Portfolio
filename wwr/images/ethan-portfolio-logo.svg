<svg xmlns="http://www.w3.org/2000/svg" width="360" height="120" viewBox="0 0 360 120" role="img" aria-labelledby="title desc">
<title id="title">Ethan Portfolio Logo</title>
<desc id="desc">Stylized EP initials next to Ethan Portfolio text.</desc>
<rect width="360" height="120" rx="16" fill="#1f2937"/>
<rect x="12" y="12" width="96" height="96" rx="12" fill="#38bdf8"/>
<text x="28" y="76" fill="#0f172a" font-family="Merriweather, Georgia, serif" font-size="44" font-weight="700">EP</text>
<text x="128" y="56" fill="#f8fafc" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" font-weight="600">Ethan</text>
<text x="128" y="86" fill="#f97316" font-family="'Source Sans 3', Arial, sans-serif" font-size="26" font-weight="600">Portfolio</text>
</svg>
