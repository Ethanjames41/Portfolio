<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Home wireframe</title>
  <desc id="desc">Simple wireframe showing a header, hero section, and two preview sections.</desc>
  <rect width="800" height="500" fill="#ffffff"/>
  <rect x="35" y="30" width="730" height="55" fill="#d1d5db"/>
  <rect x="55" y="110" width="690" height="120" fill="#e5e7eb"/>
  <rect x="55" y="255" width="325" height="170" fill="#f3f4f6"/>
  <rect x="420" y="255" width="325" height="170" fill="#f3f4f6"/>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#374151">Header / Nav</text>
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#374151">Intro / Hero</text>
  <text x="218" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#374151">Skills Preview</text>
  <text x="582" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#374151">Page Links</text>
</svg>
