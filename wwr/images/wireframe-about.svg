<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">About wireframe</title>
  <desc id="desc">Simple wireframe with a profile area, text sections, and supporting image blocks.</desc>
  <rect width="800" height="500" fill="#ffffff"/>
  <rect x="35" y="30" width="730" height="55" fill="#d1d5db"/>
  <rect x="55" y="110" width="210" height="300" fill="#f3f4f6"/>
  <rect x="295" y="110" width="450" height="110" fill="#e5e7eb"/>
  <rect x="295" y="240" width="450" height="80" fill="#f3f4f6"/>
  <rect x="295" y="340" width="215" height="70" fill="#e5e7eb"/>
  <rect x="530" y="340" width="215" height="70" fill="#e5e7eb"/>
  <text x="400" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#374151">Header / Nav</text>
  <text x="160" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#374151">Profile Image</text>
  <text x="520" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#374151">Background Text</text>
  <text x="520" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#374151">Skills / Goals</text>
  <text x="402" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#374151">Support Image</text>
  <text x="638" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#374151">Support Image</text>
</svg>
